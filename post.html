<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post — Murath Musni</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0a0d12; --bg2: #0f1318; --surface: #1a2030;
    --border: rgba(255,255,255,0.07);
    --accent: #00d4aa;
    --text: #e8eaf0; --muted: #7a8499; --muted2: #4a5568;
    --mono: 'JetBrains Mono', monospace; --sans: 'Inter', sans-serif;
    --radius: 12px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); line-height: 1.7; }
  a { color: var(--accent); }
  nav {
    position: sticky; top:0; z-index:100; display:flex; align-items:center; justify-content:space-between;
    padding: 1rem 2.5rem; background: rgba(10,13,18,0.9); backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo { font-family: var(--mono); font-size: 13px; letter-spacing: 0.05em; color: var(--accent); text-decoration:none; }
  .nav-links { list-style:none; display:flex; gap:2rem; font-size:14px; }
  .nav-links a { color: var(--text); text-decoration:none; }
  .nav-links a:hover { color: var(--accent); }
  article { max-width: 720px; margin: 0 auto; padding: 4rem 2rem 6rem; }
  .post-date { font-family: var(--mono); font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  h1 { font-size: clamp(2rem, 5vw, 2.8rem); font-weight: 700; letter-spacing: -0.02em; margin: 0.75rem 0 1.5rem; }
  .cover { width:100%; border-radius: var(--radius); margin-bottom: 2rem; background: var(--surface); }
  .content { font-size: 1.08rem; color: #d7dae2; }
  .content p { margin-bottom: 1.3rem; }
  .content h2 { font-size: 1.5rem; margin: 2rem 0 1rem; color: var(--text); }
  .content h3 { font-size: 1.2rem; margin: 1.5rem 0 0.75rem; color: var(--text); }
  .content img { max-width: 100%; border-radius: var(--radius); margin: 1.5rem 0; }
  .content a { text-decoration: underline; }
  .content blockquote { border-left: 3px solid var(--accent); padding-left: 1rem; color: var(--muted); margin: 1.5rem 0; }
  .content pre { background: var(--surface); padding: 1rem; border-radius: 8px; overflow-x: auto; margin: 1.5rem 0; }
  .content ul, .content ol { margin: 1rem 0 1rem 1.5rem; }
  .back { display:inline-block; margin-top: 3rem; font-family: var(--mono); font-size: 13px; }
  .empty { text-align:center; padding: 6rem 0; color: var(--muted); font-family: var(--mono); font-size: 13px; }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">MM // portfolio</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="blog.html">Blog</a></li>
  </ul>
</nav>

<article id="article">Loading…</article>

<script src="config.js"></script>
<script>
function fmtDate(d){ return d ? new Date(d).toLocaleDateString(undefined, { year:'numeric', month:'long', day:'numeric' }) : ''; }

async function loadPost(){
  const el = document.getElementById('article');
  const slug = new URLSearchParams(window.location.search).get('slug');
  if (!slug) { el.innerHTML = '<div class="empty">No post specified.</div>'; return; }

  try {
    const { data: post, error } = await supabaseClient
      .from('blog_posts')
      .select('*')
      .eq('slug', slug)
      .eq('status', 'published')
      .single();
    if (error || !post) throw error || new Error('not found');

    document.title = post.title + ' — Murath Musni';
    el.innerHTML = `
      <div class="post-date">${fmtDate(post.published_at)}</div>
      <h1>${post.title}</h1>
      ${post.cover_image_url ? `<img class="cover" src="${post.cover_image_url}" alt="">` : ''}
      <div class="content">${post.content_html}</div>
      <a class="back" href="blog.html">← Back to all posts</a>
    `;
  } catch (err) {
    console.error(err);
    el.innerHTML = '<div class="empty">Post not found or not yet published.</div>';
  }
}
loadPost();
</script>
</body>
</html>
