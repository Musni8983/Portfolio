<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="icon" href="favicon.svg"><title>Article - Murath Musni</title><script src="https://unpkg.com/@supabase/supabase-js@2"></script><style>:root{--bg:#0a0d12;--s:#141920;--b:#ffffff18;--a:#00d4aa;--t:#e8eaf0;--m:#8a94a8;font-family:Arial,sans-serif}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--t);line-height:1.75}nav{display:flex;justify-content:space-between;padding:1rem 6%;border-bottom:1px solid var(--b)}a{color:var(--a);text-decoration:none}.logo,.meta,.tag{font-family:monospace}.logo{font-size:.85rem}.wrap{max-width:800px;margin:auto;padding:4rem 1.5rem}.meta{font-size:.72rem;color:var(--m);text-transform:uppercase}.cover{width:100%;max-height:440px;object-fit:cover;border-radius:10px;margin:1.5rem 0}.content{font-size:1.06rem}.content img{max-width:100%;border-radius:8px}.content pre{background:var(--s);padding:1rem;overflow:auto}.tags{display:flex;gap:.5rem;flex-wrap:wrap;margin:1rem 0}.tag{font-size:.7rem;color:var(--a);background:#00d4aa15;padding:.2rem .45rem}.related{margin-top:4rem;border-top:1px solid var(--b);padding-top:2rem}.cards{display:grid;gap:1rem;grid-template-columns:repeat(auto-fit,minmax(190px,1fr))}.cards a{background:var(--s);padding:1rem;color:var(--t)}.skeleton{height:460px;background:linear-gradient(90deg,var(--s),#253044,var(--s));background-size:200% 100%;animation:x 1s infinite}@keyframes x{to{background-position:-200%}}</style></head><body><nav><a class="logo" href="index.html">MM // PORTFOLIO</a><span><a href="blog.html">Blog</a>  <a href="rss.xml">RSS</a></span></nav><main class="wrap" id="article"><div class="skeleton"></div></main><script src="config.js"></script><script>const e=s=>(s||'').toString().replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));const slug=new URLSearchParams(location.search).get('slug');const mins=p=>Math.max(1,Math.ceil((p.content_html||'').replace(/<[^>]*>/g,' ').trim().split(/\s+/).filter(Boolean).length/220));(async()=>{const R=document.querySelector('#article');if(!slug){R.innerHTML='<p>Article not specified.</p>';return}const{data:p,error}=await supabaseClient.from('blog_posts').select('*').eq('slug',slug).eq('status','published').single();if(error||!p){R.innerHTML='<p>Article not found. <a href="blog.html">Return to blog</a></p>';return}document.title=p.title+' - Murath Musni';const{data:all}=await supabaseClient.from('blog_posts').select('title,slug,excerpt,category,tags').eq('status','published').neq('id',p.id).order('published_at',{ascending:false}).limit(12);const related=(all||[]).filter(x=>x.category===p.category||(x.tags||[]).some(t=>(p.tags||[]).includes(t))).slice(0,3);R.innerHTML=`<div class="meta">${new Date(p.published_at).toLocaleDateString()}  ${mins(p)} min read  ${e(p.category||'General')}</div><h1>${e(p.title)}</h1><div class="tags">${(p.tags||[]).map(t=>`<span class="tag">#${e(t)}</span>`).join('')}</div>${p.cover_image_url?`<img class="cover" src="${e(p.cover_image_url)}" alt="">`:''}<div class="content">${p.content_html}</div><section class="related"><div class="meta">RELATED POSTS</div><div class="cards">${related.map(x=>`<a href="post.html?slug=${encodeURIComponent(x.slug)}"><strong>${e(x.title)}</strong><br><small>${e(x.excerpt)}</small></a>`).join('')||'<span style="color:var(--m)">More articles coming soon.</span>'}</div></section><p><a href="blog.html"><- All posts</a></p>`;supabaseClient.from('page_views').insert({page_path:'post.html',post_slug:slug}).then(()=>{})})()</script></body></html>
