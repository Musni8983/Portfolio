<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Signal Lost</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a; --neon-blue: #00d9e8; --neon-green: #2be08a;
    --text: #e2e8f0; --muted: #94a3b8;
    --mono: 'Share Tech Mono', monospace; --display: 'Orbitron', sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg); color: var(--text); font-family: var(--mono);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    text-align: center; padding: 2rem;
  }
  h1 {
    font-family: var(--display); font-size: clamp(4rem, 12vw, 9rem); color: var(--neon-blue);
    text-shadow: 0 0 20px var(--neon-blue), 0 0 40px rgba(0,217,232,0.5);
    animation: glitch 2.5s ease-in-out infinite;
  }
  @keyframes glitch { 0%,100% { opacity:1; } 92% { opacity:1; } 93% { opacity:0.4; transform: translateX(2px); } 94% { opacity:1; transform: translateX(0); } }
  p { color: var(--muted); margin: 1rem 0 2rem; font-size: 1rem; }
  a {
    display: inline-block; padding: 12px 28px; border: 1px solid var(--neon-green);
    color: var(--neon-green); text-decoration: none; font-size: 0.85rem;
    letter-spacing: 0.05em; transition: all 0.25s ease;
  }
  a:hover { background: var(--neon-green); color: #04120e; box-shadow: 0 0 20px rgba(43,224,138,0.5); }
</style>
</head>
<body>
  <div>
    <h1>404</h1>
    <p>// CONNECTION TERMINATED - Requested resource not found on this node.</p>
    <a href="index.html">&larr; Return to base</a>
  </div>
</body>
</html>
