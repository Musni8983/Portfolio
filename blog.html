<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="description" content="Networking, cloud security, and IT operations notes by Murath Musni."><link rel="icon" href="favicon.svg"><title>Blog - Murath Musni</title><script src="https://unpkg.com/@supabase/supabase-js@2"></script><style>:root{--bg:#0a0d12;--s:#141920;--b:#ffffff18;--a:#00d4aa;--t:#e8eaf0;--m:#8a94a8;font-family:Arial,sans-serif}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--t);line-height:1.6}a{color:inherit;text-decoration:none}nav{display:flex;justify-content:space-between;padding:1rem 6%;border-bottom:1px solid var(--b)}.logo,.meta,.tag,.filter{font-family:monospace}.logo{color:var(--a)}.links,.filters,.tags{display:flex;gap:.6rem;flex-wrap:wrap}.wrap{max-width:860px;margin:auto;padding:4rem 1.5rem}h1{font-size:clamp(2.5rem,7vw,4rem);margin:.3rem 0}.lead,.excerpt{color:var(--m)}.filters{margin:2rem 0}.filter{padding:.5rem .7rem;background:transparent;color:var(--m);border:1px solid var(--b);cursor:pointer}.filter.active{color:var(--a);border-color:var(--a)}.card{display:block;padding:2rem 0;border-top:1px solid var(--b)}.cover{width:100%;height:250px;object-fit:cover;border-radius:10px;background:var(--s)}h2{margin:.4rem 0}.meta{font-size:.72rem;color:var(--m);text-transform:uppercase}.tag{font-size:.7rem;color:var(--a);background:#00d4aa15;padding:.2rem .45rem}.skeleton{height:180px;margin:1rem 0;background:linear-gradient(90deg,var(--s),#253044,var(--s));background-size:200% 100%;animation:x 1s infinite}@keyframes x{to{background-position:-200%}}.empty{text-align:center;color:var(--m);padding:3rem}</style></head><body><nav><a class="logo" href="index.html">MM // PORTFOLIO</a><div class="links"><a href="index.html">Home</a><a href="rss.xml">RSS</a></div></nav><main class="wrap"><div class="meta">// KNOWLEDGE BASE</div><h1>The Blog</h1><p class="lead">Networking, cloud security, and practical IT notes.</p><div id="filters" class="filters"></div><section id="list"><div class="skeleton"></div><div class="skeleton"></div></section></main><script src="config.js"></script><script>const L=document.querySelector('#list'),F=document.querySelector('#filters');let P=[],A='All';const e=s=>(s||'').toString().replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));const mins=p=>Math.max(1,Math.ceil((p.content_html||'').replace(/<[^>]*>/g,' ').trim().split(/\s+/).filter(Boolean).length/220));function draw(){let cs=['All',...new Set(P.map(p=>p.category||'General'))];F.innerHTML=cs.map(c=>`<button class="filter ${A===c?'active':''}" data-c="${e(c)}">${e(c)}</button>`).join('');F.querySelectorAll('button').forEach(b=>b.onclick=()=>{A=b.dataset.c;draw()});let q=A==='All'?P:P.filter(p=>(p.category||'General')===A);L.innerHTML=q.map(p=>`<a class="card" href="post.html?slug=${encodeURIComponent(p.slug)}">${p.cover_image_url?`<img class="cover" src="${e(p.cover_image_url)}" alt="">`:''}<div class="meta">${new Date(p.published_at).toLocaleDateString()}  ${mins(p)} min read  ${e(p.category||'General')}</div><h2>${e(p.title)}</h2><p class="excerpt">${e(p.excerpt)}</p><div class="tags">${(p.tags||[]).map(t=>`<span class="tag">#${e(t)}</span>`).join('')}</div></a>`).join('')||'<p class="empty">No posts here yet.</p>'}(async()=>{let{data,error}=await supabaseClient.from('blog_posts').select('*').eq('status','published').order('published_at',{ascending:false});if(error){L.innerHTML='<p class="empty">Unable to load posts.</p>';return}P=data||[];draw();supabaseClient.from('page_views').insert({page_path:'blog.html'}).then(()=>{})})()</script></body></html>
