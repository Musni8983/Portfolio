<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — Murath Musni</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0a0d12; --bg2: #0f1318; --bg3: #141920; --surface: #1a2030;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
    --accent: #00d4aa; --accent2: #0098ff; --accent3: #7c3aed;
    --text: #e8eaf0; --muted: #7a8499; --muted2: #4a5568;
    --mono: 'JetBrains Mono', monospace; --sans: 'Inter', sans-serif;
    --radius: 12px; --radius-sm: 8px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); line-height: 1.6; }
  a { text-decoration: none; color: inherit; }
  nav {
    position: sticky; top:0; z-index:100; display:flex; align-items:center; justify-content:space-between;
    padding: 1rem 2.5rem; background: rgba(10,13,18,0.9); backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo { font-family: var(--mono); font-size: 13px; letter-spacing: 0.05em; color: var(--accent); }
  .nav-links { list-style:none; display:flex; gap:2rem; font-size:14px; }
  .nav-links a:hover { color: var(--accent); }
  .wrap { max-width: 860px; margin: 0 auto; padding: 4rem 2rem; }
  .page-head { margin-bottom: 3rem; }
  .page-head .label { font-family: var(--mono); font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.75rem; }
  .page-head h1 { font-size: clamp(2.2rem, 5vw, 3rem); font-weight: 600; letter-spacing: -0.02em; }
  .page-head p { color: var(--muted); margin-top: 0.75rem; max-width: 560px; }
  .post-card { display:block; padding: 2rem 0; border-top: 1px solid var(--border); transition: opacity 0.2s; }
  .post-card:first-of-type { border-top: 1px solid var(--border); }
  .post-card:hover { opacity: 0.85; }
  .post-cover { width:100%; height: 280px; object-fit: cover; border-radius: var(--radius); margin-bottom: 1.25rem; background: var(--surface); }
  .post-date { font-family: var(--mono); font-size: 11.5px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .post-card h2 { font-size: 1.6rem; font-weight: 600; margin: 0.5rem 0 0.6rem; letter-spacing: -0.01em; }
  .post-excerpt { color: var(--muted); font-size: 0.98rem; }
  .empty { text-align:center; padding: 4rem 0; color: var(--muted); font-family: var(--mono); font-size: 13px; }
  footer { text-align:center; padding: 3rem 2rem; color: var(--muted2); font-size: 12.5px; border-top: 1px solid var(--border); }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">MM // portfolio</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="blog.html">Blog</a></li>
    <li><a href="index.html#contact">Contact</a></li>
  </ul>
</nav>

<div class="wrap">
  <div class="page-head">
    <div class="label">Writing</div>
    <h1>The Blog</h1>
    <p>Notes on networking, cloud security, and everything I'm learning day to day.</p>
  </div>
  <div id="post-list">Loading posts…</div>
</div>

<footer>© 2026 Murath Musni</footer>

<script src="config.js"></script>
<script>
function esc(s){ return (s ?? '').toString().replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function fmtDate(d){ return d ? new Date(d).toLocaleDateString(undefined, { year:'numeric', month:'long', day:'numeric' }) : ''; }

async function loadPosts(){
  const list = document.getElementById('post-list');
  try {
    const { data: posts, error } = await supabaseClient
      .from('blog_posts')
      .select('title, slug, excerpt, cover_image_url, published_at')
      .eq('status', 'published')
      .order('published_at', { ascending: false });
    if (error) throw error;

    if (!posts || posts.length === 0) {
      list.innerHTML = '<div class="empty">No posts published yet — check back soon.</div>';
      return;
    }

    list.innerHTML = posts.map(p => `
      <a class="post-card" href="post.html?slug=${encodeURIComponent(p.slug)}">
        ${p.cover_image_url ? `<img class="post-cover" src="${esc(p.cover_image_url)}" alt="">` : ''}
        <div class="post-date">${fmtDate(p.published_at)}</div>
        <h2>${esc(p.title)}</h2>
        <p class="post-excerpt">${esc(p.excerpt)}</p>
      </a>
    `).join('');
  } catch (err) {
    console.error(err);
    list.innerHTML = '<div class="empty">Could not load posts. Check config.js has your Supabase URL and key.</div>';
  }
}
loadPosts();
</script>
</body>
</html>
